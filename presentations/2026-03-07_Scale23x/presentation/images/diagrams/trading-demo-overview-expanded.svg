<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" width="820" height="440">
  <defs>
    <marker id="arr-tdo" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#42affa"/>
    </marker>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- LEFT COLUMN -->

  <!-- Order Management -->
  <rect x="24" y="24" width="200" height="72" rx="9"
        fill="rgba(66,175,250,0.10)" stroke="#42affa" stroke-width="2"/>
  <text x="124" y="67" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="white">Order Management</text>

  <!-- Stocks, Portfolio, Watchlist -->
  <rect x="24" y="176" width="200" height="88" rx="9"
        fill="rgba(66,175,250,0.10)" stroke="#42affa" stroke-width="2"/>
  <text x="124" y="210" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="white">Stocks, Portfolio,</text>
  <text x="124" y="234" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="white">Watchlist</text>

  <!-- Market Data -->
  <rect x="24" y="344" width="200" height="72" rx="9"
        fill="rgba(66,175,250,0.10)" stroke="#42affa" stroke-width="2"/>
  <text x="124" y="387" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="white">Market Data</text>

  <!-- MIDDLE -->

  <!-- Trading System -->
  <rect x="310" y="120" width="200" height="200" rx="9"
        fill="rgba(66,175,250,0.25)" stroke="#42affa" stroke-width="3"
        filter="url(#glow)"/>
  <text x="410" y="226" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="white">Trading System</text>

  <!-- RIGHT -->

  <!-- Trading Application -->
  <rect x="596" y="152" width="200" height="136" rx="9"
        fill="rgba(66,175,250,0.10)" stroke="#42affa" stroke-width="2"/>
  <text x="696" y="212" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="white">Trading</text>
  <text x="696" y="236" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="white">Application</text>

  <!-- ARROWS -->

  <!-- Order Management → Trading System -->
  <polyline points="226,60 268,60 268,180 308,180"
        fill="none" stroke="#42affa" stroke-width="2" stroke-linejoin="round"
        marker-end="url(#arr-tdo)"/>

  <!-- Stocks/Portfolio/Watchlist → Trading System -->
  <line x1="226" y1="220" x2="308" y2="220"
        stroke="#42affa" stroke-width="2" marker-end="url(#arr-tdo)"/>

  <!-- Market Data → Trading System -->
  <polyline points="226,380 268,380 268,260 308,260"
        fill="none" stroke="#42affa" stroke-width="2" stroke-linejoin="round"
        marker-end="url(#arr-tdo)"/>

  <!-- Trading System → Trading Application -->
  <line x1="512" y1="220" x2="594" y2="220"
        stroke="#42affa" stroke-width="2" marker-end="url(#arr-tdo)"/>
</svg>
